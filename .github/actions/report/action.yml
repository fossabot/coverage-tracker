name: 'Coverage Tracker Report'
description: >
  Read consumer-produced code-quality reports (coverage, complexity,
  duplication) and report them to a self-hosted coverage-tracker Worker. The
  Action does NOT run your tests or coverage tools — run those first, then point
  this Action at the report files (or rely on default-path auto-detection). On
  push to the default branch the metrics are persisted; on pull_request a Check
  Run is posted and the job fails if any configured threshold is breached.

  Required consuming-workflow permissions:
    permissions:
      id-token: write   # mint OIDC token for Worker auth
      checks: write     # post Check Run on PRs

author: 'CoverageTracker'

inputs:
  worker-url:
    description: >
      Base URL of your coverage-tracker Cloudflare Worker,
      e.g. https://coverage.example.com
    required: true

  # ── Coverage report (consumer runs tests first) ──────────────────────────
  coverage-path:
    description: >
      Path to the coverage report. Optional: when unset, the Action probes the
      documented per-language default paths (LCOV, Cobertura, JaCoCo, or the Go
      coverage profile) and uses the first hit. Fails with the list of probed
      paths if none is found. An explicit path always wins.
    required: false
    default: ''

  coverage-tool:
    description: >
      Only relevant for Cobertura reports, whose branch-coverage semantics vary
      by producer (e.g. coverage.py, gcovr, phpunit). Naming the tool silences
      the "trusting the data" warning. Ignored for LCOV / JaCoCo / Go.
    required: false
    default: ''

  # ── Optional complexity / duplication reports ────────────────────────────
  complexity-path:
    description: >
      Path to a complexity report (Radon JSON, gocyclo text, or Lizard XML).
      Optional: when unset, the Action probes radon.json → gocyclo.txt →
      lizard-report.xml. If a JaCoCo coverage report is supplied, complexity is
      derived from it for free unless a complexity report overrides it. Missing
      is a hard failure only when max-complexity is set; otherwise skipped.
    required: false
    default: ''

  duplication-path:
    description: >
      Path to a jscpd JSON report. Optional: when unset, the Action probes
      jscpd-report/jscpd-report.json. The Action no longer runs jscpd itself —
      run it first. Missing is a hard failure only when max-duplication is set;
      otherwise skipped.
    required: false
    default: ''

  # ── Thresholds (all optional; omit to skip that check) ───────────────────
  min-coverage:
    description: >
      Minimum coverage percentage (absolute floor).
      Job fails if current coverage is below this value.
    required: false
    default: ''

  max-coverage-drop:
    description: >
      Maximum allowed coverage drop from the default-branch baseline,
      in percentage points. PR checks only — requires a prior push to
      have ingested a baseline.
    required: false
    default: ''

  max-complexity:
    description: >
      Maximum allowed average cyclomatic complexity score. Job fails if the
      collected complexity exceeds this value. When set, a missing complexity
      report is a hard failure.
    required: false
    default: ''

  max-duplication:
    description: >
      Maximum allowed code duplication percentage. Job fails if the jscpd report
      exceeds this value. When set, a missing duplication report is a hard
      failure.
    required: false
    default: ''

  github-token:
    description: >
      Token used to post the PR Check Run. Defaults to the workflow's
      automatic GITHUB_TOKEN; override only if you need a different identity.
    required: false
    default: ${{ github.token }}

runs:
  using: 'node24'
  main: 'dist/index.js'
